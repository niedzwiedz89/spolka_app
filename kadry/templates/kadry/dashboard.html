{% extends "kadry/base.html" %}

{% block title %}Spolka App – Pulpit{% endblock %}

{% block content %}
<div class="dashboard">
    <h1 class="dashboard-title">Pulpit</h1>
    <p class="dashboard-subtitle">Wybierz moduł, aby przejść do zarządzania</p>

    <div class="dashboard-grid">
        <!-- Pracownicy -->
        <a href="{% url 'pracownik_list' %}" class="tile tile-blue">
            <div class="tile-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
                    <circle cx="9" cy="7" r="4" />
                    <path d="M22 21v-2a4 4 0 0 0-3-3.87" />
                    <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                </svg>
            </div>
            <div class="tile-label">Pracownicy</div>
            <div class="tile-count">{{ stats.pracownicy }}</div>
        </a>

        <!-- Budowy -->
        <a href="{% url 'budowa_list' %}" class="tile tile-green">
            <div class="tile-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M2 20h20" />
                    <path d="M5 20V8l7-5 7 5v12" />
                    <path d="M9 20v-4h6v4" />
                    <path d="M9 12h.01M15 12h.01" />
                </svg>
            </div>
            <div class="tile-label">Budowy</div>
            <div class="tile-count">{{ stats.budowy }}</div>
        </a>

        <!-- Mieszkania -->
        <a href="{% url 'mieszkanie_list' %}" class="tile tile-orange">
            <div class="tile-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                    <polyline points="9 22 9 12 15 12 15 22" />
                </svg>
            </div>
            <div class="tile-label">Mieszkania</div>
            <div class="tile-count">{{ stats.mieszkania }}</div>
        </a>

        <!-- Flota -->
        <a href="{% url 'pojazd_list' %}" class="tile tile-red">
            <div class="tile-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M7 17m-2 0a2 2 0 1 0 4 0a2 2 0 1 0-4 0" />
                    <path d="M17 17m-2 0a2 2 0 1 0 4 0a2 2 0 1 0-4 0" />
                    <path d="M5 17H3v-6l2-5h9l4 5h1a2 2 0 0 1 2 2v4h-2m-4 0H9" />
                    <line x1="10" y1="6" x2="10" y2="11" />
                    <line x1="5" y1="11" x2="19" y2="11" />
                </svg>
            </div>
            <div class="tile-label">Flota</div>
            <div class="tile-count">{{ stats.pojazdy }}</div>
        </a>
    </div>
</div>
{% endblock %}
